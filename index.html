<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    button, input, select { font: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    input, select { border: none; outline: none; }

    /* Slate palette */
    :root {
      --slate-100: #f1f5f9; --slate-300: #cbd5e1; --slate-400: #94a3b8;
      --slate-500: #64748b; --slate-600: #475569; --slate-700: #334155;
      --slate-800: #1e293b; --slate-900: #0f172a;
      --amber-300: #fcd34d; --amber-500: #f59e0b; --amber-600: #d97706; --amber-700: #b45309;
      --emerald-300: #6ee7b7; --emerald-600: #059669; --emerald-700: #047857; --emerald-900: #064e3b;
      --blue-300: #93c5fd; --blue-900: #1e3a5f;
      --green-300: #86efac; --green-900: #14532d;
      --orange-300: #fdba74; --orange-900: #7c2d12;
      --yellow-300: #fde047; --yellow-900: #713f12;
      --pink-300: #f9a8d4; --pink-900: #831843;
      --purple-300: #d8b4fe; --purple-900: #581c87;
      --red-400: #f87171; --red-900: #7f1d1d;
      --cyan-300: #67e8f9; --cyan-900: #164e63;
    }

    /* Layout */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .flex-wrap { flex-wrap: wrap; }
    .flex-1 { flex: 1 1 0%; }
    .grid { display: grid; }
    .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
    .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 0.75rem; }
    .items-center { align-items: center; }
    .items-start { align-items: flex-start; }
    .justify-between { justify-content: space-between; }
    .min-w-0 { min-width: 0; }
    .min-h-screen { min-height: 100vh; }
    .w-full { width: 100%; }
    .w-24 { width: 6rem; }
    .max-w-2xl { max-width: 42rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .hidden { display: none; }

    /* Spacing */
    .p-2 { padding: 0.5rem; }
    .p-3 { padding: 0.75rem; }
    .p-4 { padding: 1rem; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
    .py-0\.5 { padding-top: 0.125rem; padding-bottom: 0.125rem; }
    .py-1\.5 { padding-top: 0.375rem; padding-bottom: 0.375rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 0.75rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .mb-8 { margin-bottom: 2rem; }
    .ml-2 { margin-left: 0.5rem; }
    .mt-1 { margin-top: 0.25rem; }

    /* Typography */
    .text-2xl { font-size: 1.5rem; line-height: 2rem; }
    .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
    .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
    .text-xs { font-size: 0.75rem; line-height: 1rem; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .font-medium { font-weight: 500; }
    .font-normal { font-weight: 400; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .whitespace-nowrap { white-space: nowrap; }
    .select-none { user-select: none; }
    .transition { transition: all 150ms ease; }

    /* Borders */
    .rounded { border-radius: 0.25rem; }
    .rounded-lg { border-radius: 0.5rem; }
    .rounded-full { border-radius: 9999px; }
    .border-2 { border-width: 2px; border-style: solid; }
    .border-dashed { border-style: dashed; }
    .border-slate-600 { border-color: var(--slate-600); }
    .border-amber-500\/50 { border-color: rgba(245, 158, 11, 0.5); }

    /* Background colors */
    .bg-slate-700 { background-color: var(--slate-700); }
    .bg-slate-800 { background-color: var(--slate-800); }
    .bg-slate-900 { background-color: var(--slate-900); }
    .bg-amber-500 { background-color: var(--amber-500); }
    .bg-amber-600 { background-color: var(--amber-600); }
    .bg-emerald-600 { background-color: var(--emerald-600); }
    .bg-blue-900 { background-color: var(--blue-900); }
    .bg-green-900 { background-color: var(--green-900); }
    .bg-orange-900 { background-color: var(--orange-900); }
    .bg-yellow-900 { background-color: var(--yellow-900); }
    .bg-pink-900 { background-color: var(--pink-900); }
    .bg-purple-900 { background-color: var(--purple-900); }
    .bg-emerald-900 { background-color: var(--emerald-900); }
    .bg-red-900 { background-color: var(--red-900); }
    .bg-cyan-900 { background-color: var(--cyan-900); }

    /* Text colors */
    .text-slate-100 { color: var(--slate-100); }
    .text-slate-300 { color: var(--slate-300); }
    .text-slate-400 { color: var(--slate-400); }
    .text-slate-500 { color: var(--slate-500); }
    .text-slate-600 { color: var(--slate-600); }
    .text-slate-900 { color: var(--slate-900); }
    .text-amber-300 { color: var(--amber-300); }
    .text-blue-300 { color: var(--blue-300); }
    .text-green-300 { color: var(--green-300); }
    .text-orange-300 { color: var(--orange-300); }
    .text-yellow-300 { color: var(--yellow-300); }
    .text-pink-300 { color: var(--pink-300); }
    .text-purple-300 { color: var(--purple-300); }
    .text-emerald-300 { color: var(--emerald-300); }
    .text-red-400 { color: var(--red-400); }
    .text-cyan-300 { color: var(--cyan-300); }

    /* Hover states */
    .hover\:bg-amber-600:hover { background-color: var(--amber-600); }
    .hover\:bg-amber-700:hover { background-color: var(--amber-700); }
    .hover\:bg-emerald-700:hover { background-color: var(--emerald-700); }
    .hover\:bg-slate-700:hover { background-color: var(--slate-700); }
    .hover\:text-slate-300:hover { color: var(--slate-300); }
    .hover\:text-red-400:hover { color: var(--red-400); }


    /* Responsive */
    @media (min-width: 640px) {
      .sm\:flex-row { flex-direction: row; }
      .sm\:items-center { align-items: center; }
      .sm\:justify-between { justify-content: space-between; }
    }

    /* Print */
    @media print {
      body { background: white; color: black; }
      .no-print { display: none !important; }
      .week-grid { page-break-inside: avoid; }
      .meal-card { border: 1px solid #ccc; background: white; color: black; }
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4">
  <div id="app" class="max-w-2xl mx-auto"></div>

  <script>
    const STORAGE_KEY = 'meal-planner-v2';

    const defaultMeals = [
      { id: 1, name: 'Shrimp Pasta', type: 'cook', category: 'Main', ingredients: ['Noodles', 'Frozen Garlic Shrimp'], instructions: [] },
      { id: 2, name: 'Pizza', type: 'order', category: 'Main', place: 'Pinks' },
      { id: 3, name: 'Ramen', type: 'order', category: 'Main', place: 'Jinya' },
      { id: 4, name: 'Barnabys', type: 'order', category: 'Main', place: 'Barnabys' },
      { id: 5, name: 'El Tiempo', type: 'order', category: 'Main', place: 'El Tiempo' },
      { id: 6, name: 'Mac & Cheese', type: 'cook', category: 'Main', ingredients: ["Amy's Box", 'Milk', 'Butter'], instructions: [] },
      { id: 7, name: 'Chicken Nuggets', type: 'cook', category: 'Main', ingredients: ['Frozen Chicken Nuggets'], instructions: [] },
      { id: 8, name: 'BBQ Chicken', type: 'cook', category: 'Main', ingredients: ['Marinated Chicken Thighs'], instructions: [] },
    ];

    const CATEGORIES = ['All', 'Main', 'Soup', 'Bread', 'Dessert', 'Side', 'Salad', 'Condiment', 'Drink'];
    const CATEGORY_COLORS = {
      Main: 'bg-green-900 text-green-300',
      Soup: 'bg-orange-900 text-orange-300',
      Bread: 'bg-yellow-900 text-yellow-300',
      Dessert: 'bg-pink-900 text-pink-300',
      Side: 'bg-purple-900 text-purple-300',
      Salad: 'bg-emerald-900 text-emerald-300',
      Condiment: 'bg-red-900 text-red-300',
      Drink: 'bg-cyan-900 text-cyan-300',
    };

    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

    let state = load();
    let activeFilter = 'All';
    let recipesLoaded = false;

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved && saved.meals && saved.week) return saved;
      } catch (e) {}
      return { meals: [...defaultMeals], week: {} };
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    async function loadRecipes() {
      try {
        const resp = await fetch('recipes.json');
        if (!resp.ok) return;
        const recipes = await resp.json();
        const existingIds = new Set(state.meals.map(m => m.id));
        let added = 0;
        for (const r of recipes) {
          if (!existingIds.has(r.id)) {
            state.meals.push(r);
            existingIds.add(r.id);
            added++;
          }
        }
        if (added > 0) {
          save();
          console.log(`Loaded ${added} new recipes`);
        }
        recipesLoaded = true;
      } catch (e) {
        console.log('No recipes.json found, using defaults');
      }
      render();
    }

    function catColor(cat) {
      return CATEGORY_COLORS[cat] || 'bg-slate-700 text-slate-300';
    }

    function filteredMeals() {
      if (activeFilter === 'All') return state.meals;
      return state.meals.filter(m => m.category === activeFilter);
    }

    function render() {
      const meals = filteredMeals();
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
          <h1 class="text-2xl font-bold">Meal Planner</h1>
          <div class="flex flex-wrap gap-2">
            <button onclick="printWeek()" class="text-sm px-3 py-1.5 bg-amber-600 hover:bg-amber-700 rounded no-print">🖨️ Print</button>
            <button onclick="syncToTRMNL()" id="sync-btn" class="text-sm px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 rounded no-print">📡 Sync to TRMNL</button>
            <button onclick="clearWeek()" class="text-sm text-slate-500 hover:text-slate-300 no-print">Clear Week</button>
          </div>
        </div>

        <!-- Week Grid -->
        <div class="week-grid grid grid-cols-1 gap-3 mb-8">
          ${days.map(day => {
            const mealId = state.week[day];
            const sideId = state.sides ? state.sides[day] : null;
            const meal = mealId ? state.meals.find(m => m.id === mealId) : null;
            const mains = state.meals.filter(m => m.category === 'Main' || m.type === 'order');
            const sides = state.meals.filter(m => m.category && m.category !== 'Main' && m.type !== 'order');
            const hasSelection = meal || sideId;
            return `
              <div class="rounded-lg p-3 ${hasSelection ? 'bg-slate-700 border-2 border-amber-500/50' : 'bg-slate-800 border-2 border-dashed border-slate-600'}">
                  <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-slate-400 whitespace-nowrap" style="min-width:5rem">${day}</span>
                    <div class="flex-1 flex flex-col gap-1">
                      <select onchange="pickMeal('${day}', this.value)" class="w-full bg-slate-700 text-slate-100 rounded px-2 py-2 text-sm">
                        <option value="">— main —</option>
                        ${mains.map(m => `<option value="${m.id}" ${mealId === m.id ? 'selected' : ''}>${m.name}${m.type === 'order' ? ' (order)' : ''}</option>`).join('')}
                      </select>
                      <select onchange="pickSide('${day}', this.value)" class="w-full bg-slate-700 text-slate-100 rounded px-2 py-1.5 text-sm text-slate-400">
                        <option value="">— side (optional) —</option>
                        ${sides.map(m => `<option value="${m.id}" ${sideId === m.id ? 'selected' : ''}>${m.name}</option>`).join('')}
                      </select>
                    </div>
                    ${hasSelection ? `<button onclick="clearDay('${day}')" class="text-slate-500 hover:text-red-400 text-lg">&times;</button>` : ''}
                  </div>
              </div>
            `;
          }).join('')}
        </div>

        <!-- Category Filters -->
        <div class="flex flex-wrap gap-2 mb-4">
          ${CATEGORIES.filter(c => c === 'All' || state.meals.some(m => m.category === c)).map(cat => `
            <button onclick="setFilter('${cat}')"
                    class="text-xs px-3 py-1.5 rounded-full transition ${activeFilter === cat ? 'bg-amber-500 text-slate-900 font-semibold' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}">
              ${cat}${cat !== 'All' ? ` (${state.meals.filter(m => m.category === cat).length})` : ''}
            </button>
          `).join('')}
        </div>

        <!-- Meals -->
        <h2 class="text-lg font-semibold mb-3 text-slate-300">Meals <span class="text-sm font-normal text-slate-500">(${meals.length})</span></h2>
        <div class="grid grid-cols-2 gap-3 mb-6">
          ${meals.map(meal => `
            <div class="bg-slate-800 rounded-lg p-3">
              <div class="flex justify-between items-start">
                <div class="min-w-0 flex-1">
                  <p class="font-semibold text-amber-300 text-sm truncate">${meal.name}</p>
                  <p class="text-xs text-slate-500 mt-1 truncate">${meal.type === 'order' ? 'Order: ' + meal.place : (meal.ingredients || []).slice(0, 3).join(', ')}</p>
                </div>
                <span class="text-xs px-2 py-0.5 rounded whitespace-nowrap ml-2 ${meal.type === 'order' ? 'bg-blue-900 text-blue-300' : catColor(meal.category)}">${meal.type === 'order' ? 'order' : meal.category || 'cook'}</span>
              </div>
            </div>
          `).join('')}
        </div>

        <!-- Add Meal -->
        <div class="bg-slate-800 rounded-lg p-4">
          <h3 class="text-sm font-semibold text-slate-400 mb-3">Add Meal</h3>
          <div class="flex gap-2 mb-2">
            <input id="new-name" type="text" placeholder="Meal name" class="flex-1 bg-slate-700 rounded px-3 py-2 text-sm">
            <select id="new-type" class="bg-slate-700 rounded px-3 py-2 text-sm" onchange="toggleAddFields()">
              <option value="cook">Cook</option>
              <option value="order">Order</option>
            </select>
          </div>
          <div id="cook-fields">
            <select id="new-category" class="w-full bg-slate-700 rounded px-3 py-2 text-sm mb-2">
              ${CATEGORIES.filter(c => c !== 'All').map(c => `<option value="${c}" ${c === 'Main' ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
            <input id="new-ingredients" type="text" placeholder="Ingredients (comma separated)" class="w-full bg-slate-700 rounded px-3 py-2 text-sm mb-2">
          </div>
          <div id="order-fields" class="hidden">
            <input id="new-place" type="text" placeholder="Restaurant name" class="w-full bg-slate-700 rounded px-3 py-2 text-sm mb-2">
          </div>
          <button onclick="addMeal()" class="bg-amber-500 hover:bg-amber-600 text-slate-900 px-4 py-2 rounded text-sm font-semibold w-full">Add</button>
        </div>
      `;
    }

    function setFilter(cat) {
      activeFilter = cat;
      render();
    }

    function pickMeal(day, value) {
      if (value) {
        state.week[day] = parseInt(value);
      } else {
        delete state.week[day];
      }
      save();
      render();
    }

    function pickSide(day, value) {
      if (!state.sides) state.sides = {};
      if (value) {
        state.sides[day] = parseInt(value);
      } else {
        delete state.sides[day];
      }
      save();
      render();
    }

    function clearDay(day) {
      delete state.week[day];
      if (state.sides) delete state.sides[day];
      save();
      render();
    }

    function clearWeek() {
      state.week = {};
      save();
      render();
    }

    function printWeek() {
      window.print();
    }

    async function syncToTRMNL() {
      const btn = document.getElementById('sync-btn');
      const week = {};
      for (const day of days) {
        const mealId = state.week[day];
        const sideId = state.sides ? state.sides[day] : null;
        if (!mealId && !sideId) continue;
        const meal = mealId ? state.meals.find(m => m.id === mealId) : null;
        const side = sideId ? state.meals.find(m => m.id === sideId) : null;
        week[day] = {};
        if (meal) { week[day].name = meal.name; week[day].type = meal.type; }
        if (side) { week[day].side = side.name; }
      }

      if (Object.keys(week).length === 0) {
        alert('No meals assigned yet — pick some meals for the week first.');
        return;
      }

      btn.textContent = '⏳ Syncing...';
      btn.disabled = true;

      try {
        const resp = await fetch('https://ashaman-1.tail125d67.ts.net:5678/webhook/family-meal-sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ week }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        btn.textContent = '✅ Synced!';
        setTimeout(() => { btn.textContent = '📡 Sync to TRMNL'; btn.disabled = false; }, 2000);
      } catch (err) {
        console.error('Sync failed:', err);
        btn.textContent = '❌ Failed';
        setTimeout(() => { btn.textContent = '📡 Sync to TRMNL'; btn.disabled = false; }, 3000);
        alert('Sync failed — make sure you\'re on Tailscale and Ashaman is running n8n.');
      }
    }

    function toggleAddFields() {
      const type = document.getElementById('new-type').value;
      document.getElementById('cook-fields').classList.toggle('hidden', type === 'order');
      document.getElementById('order-fields').classList.toggle('hidden', type === 'cook');
    }

    function addMeal() {
      const name = document.getElementById('new-name').value.trim();
      if (!name) return;

      const type = document.getElementById('new-type').value;
      const meal = { id: Date.now(), name, type };

      if (type === 'cook') {
        meal.category = document.getElementById('new-category').value;
        const raw = document.getElementById('new-ingredients').value;
        meal.ingredients = raw.split(',').map(s => s.trim()).filter(Boolean);
        if (!meal.ingredients.length) meal.ingredients = ['(none listed)'];
        meal.instructions = [];
      } else {
        meal.category = 'Main';
        meal.place = document.getElementById('new-place').value.trim() || name;
      }

      state.meals.push(meal);
      save();
      render();
    }

    // Initial render + load recipes
    render();
    loadRecipes();
  </script>
</body>
</html>
